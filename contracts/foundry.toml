[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
mantle_sepolia = "https://rpc.sepolia.mantle.xyz"
mantle_mainnet = "https://rpc.mantle.xyz"

[etherscan]
mantle_sepolia = { key = "placeholder", url = "https://explorer.sepolia.mantle.xyz/api" }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true